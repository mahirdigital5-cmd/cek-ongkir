<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cek Ongkir COD</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
width:320px;
}

.info{
font-size:14px;
color:#555;
margin-bottom:15px;
line-height:1.5;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
box-sizing:border-box;
}

button{
margin-top:18px;
width:100%;
padding:12px;
background:#25D366;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#20b358;
}

</style>

</head>

<body>

<div class="box">

<div class="info">
Silakan masukkan kecamatan dan <br>
kota dengan benar ya kak 😊
</div>

<input type="text" id="kecamatan" placeholder="Kecamatan">

<input type="text" id="kota" placeholder="Kota">

<button onclick="kirimWA()">Cek Ongkir</button>

</div>

<script>

function kirimWA(){

var kec = document.getElementById("kecamatan").value;
var kota = document.getElementById("kota").value;

if(kec == "" || kota == ""){
alert("Silakan isi kecamatan dan kota dulu ya kak 😊");
return;
}

var pesan = "total cod ke " + kec + ", " + kota + " adalah 25rb";

var url = "https://api.whatsapp.com/send?phone=15558770694&text=" + encodeURIComponent(pesan);

window.location.href = url;

}

</script>

</body>
</html>
