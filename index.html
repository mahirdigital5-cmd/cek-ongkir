<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cek Ongkir COD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.box{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
width:100%;
max-width:420px;
}

.info{
font-size:16px;
color:#555;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:16px;
margin-top:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
margin-top:20px;
width:100%;
padding:16px;
background:#25D366;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

button:hover{
background:#20b358;
}

</style>

</head>

<body>

<div class="box">

<div class="info">
Silakan masukkan kecamatan dan <br>
kota dengan benar ya kak 😊
</div>

<input type="text" id="kecamatan" placeholder="Kecamatan">

<input type="text" id="kota" placeholder="Kota / Kabupaten">

<button onclick="kirimWA()">Cek Ongkir</button>

</div>

<script>

function kirimWA(){

var kec = document.getElementById("kecamatan").value.trim();
var kota = document.getElementById("kota").value.trim();

if(kec === "" || kota === ""){
alert("Silakan isi kecamatan dan kota dulu ya kak 😊");
return;
}

var pesan =
"Kecamatan : " + kec + "%0A" +
"Kota : " + kota;

var url = "https://api.whatsapp.com/send?phone=15558770694&text=" + encodeURIComponent(pesan);

window.location.href = url;

}

</script>

</body>
</html>
