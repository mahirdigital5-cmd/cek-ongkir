<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cek Ongkir COD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
padding:20px;
}

.box{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
width:100%;
max-width:420px;
}

.info{
font-size:16px;
color:#555;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:16px;
margin-top:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
margin-top:20px;
width:100%;
padding:16px;
background:#25D366;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
font-size:18px;
}

button:hover{
background:#20b358;
}

.suggestion{
border:1px solid #ddd;
border-top:none;
max-height:180px;
overflow:auto;
text-align:left;
}

.suggestion div{
padding:10px;
cursor:pointer;
}

.suggestion div:hover{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="box">

<div class="info">
Silakan masukkan kecamatan dan <br>
kota dengan benar ya kak 😊
</div>

<input id="kecamatan" placeholder="Cari Kecamatan">

<div id="suggestions" class="suggestion"></div>

<input id="kota" placeholder="Kota / Kabupaten" readonly>

<button onclick="kirimWA()">Cek Ongkir</button>

</div>

<script>

let data = [];

fetch("https://raw.githubusercontent.com/emsifa/api-wilayah-indonesia/master/dist/districts.json")
.then(res => res.json())
.then(json => {
data = json;
});

const input = document.getElementById("kecamatan");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", function(){

let keyword = this.value.toLowerCase();
suggestions.innerHTML = "";

if(keyword.length < 2) return;

let results = data.filter(d =>
d.name.toLowerCase().includes(keyword)
).slice(0,8);

results.forEach(d => {

let div = document.createElement("div");

div.textContent = d.name + " - " + d.regency_name;

div.onclick = function(){

input.value = d.name;

document.getElementById("kota").value = d.regency_name;

suggestions.innerHTML = "";

};

suggestions.appendChild(div);

});

});

function kirimWA(){

let kec = document.getElementById("kecamatan").value;
let kota = document.getElementById("kota").value;

if(kec === "" || kota === ""){
alert("Silakan pilih kecamatan dari daftar ya kak 😊");
return;
}

let pesan =
"Kecamatan : " + kec + "%0A" +
"Kota : " + kota;

let url = "https://api.whatsapp.com/send?phone=15558770694&text=" + pesan;

window.location.href = url;

}

</script>

</body>
</html>
