<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cek Ongkir COD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.box{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
text-align:center;
width:100%;
max-width:420px;
}

.info{
font-size:16px;
color:#555;
margin-bottom:20px;
line-height:1.6;
}

input{
width:100%;
padding:16px;
margin-top:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:16px;
background:#25D366;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
font-size:18px;
}

.suggestion{
border:1px solid #ddd;
border-top:none;
max-height:200px;
overflow:auto;
text-align:left;
}

.suggestion div{
padding:10px;
cursor:pointer;
}

.suggestion div:hover{
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="box">

<div class="info">
Silakan masukkan kecamatan dan <br>
kota dengan benar ya kak 😊
</div>

<input id="kecamatan" placeholder="Cari Kecamatan">

<div id="suggestions" class="suggestion"></div>

<input id="kota" placeholder="Kota / Kabupaten" readonly>

<button onclick="kirimWA()">Cek Ongkir</button>

</div>

<script>

const dataWilayah = [

{ kec:"Tenggarong", kota:"Kutai Kartanegara"},
{ kec:"Loa Janan", kota:"Kutai Kartanegara"},
{ kec:"Muara Jawa", kota:"Kutai Kartanegara"},
{ kec:"Samarinda Ulu", kota:"Samarinda"},
{ kec:"Samarinda Ilir", kota:"Samarinda"},
{ kec:"Samarinda Seberang", kota:"Samarinda"},
{ kec:"Balikpapan Selatan", kota:"Balikpapan"},
{ kec:"Balikpapan Utara", kota:"Balikpapan"},
{ kec:"Balikpapan Barat", kota:"Balikpapan"},
{ kec:"Bontang Utara", kota:"Bontang"},
{ kec:"Bontang Selatan", kota:"Bontang"},

{ kec:"Cakung", kota:"Jakarta Timur"},
{ kec:"Tebet", kota:"Jakarta Selatan"},
{ kec:"Kebayoran Baru", kota:"Jakarta Selatan"},
{ kec:"Depok", kota:"Depok"},
{ kec:"Beji", kota:"Depok"},
{ kec:"Bogor Barat", kota:"Bogor"},
{ kec:"Bogor Timur", kota:"Bogor"},
{ kec:"Bandung Wetan", kota:"Bandung"},
{ kec:"Cicendo", kota:"Bandung"},
{ kec:"Coblong", kota:"Bandung"},

{ kec:"Denpasar Barat", kota:"Denpasar"},
{ kec:"Denpasar Selatan", kota:"Denpasar"},
{ kec:"Denpasar Timur", kota:"Denpasar"}

];

const input = document.getElementById("kecamatan");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", function(){

let keyword = this.value.toLowerCase();

suggestions.innerHTML="";

if(keyword.length < 2) return;

let results = dataWilayah.filter(w =>
w.kec.toLowerCase().includes(keyword)
);

results.slice(0,8).forEach(w => {

let div = document.createElement("div");

div.textContent = w.kec + " - " + w.kota;

div.onclick=function(){

input.value = w.kec;

document.getElementById("kota").value = w.kota;

suggestions.innerHTML="";

}

suggestions.appendChild(div);

});

});

function kirimWA(){

let kec = document.getElementById("kecamatan").value;
let kota = document.getElementById("kota").value;

if(kec=="" || kota==""){
alert("Silakan pilih kecamatan dari daftar ya kak 😊");
return;
}

let pesan =
"Kecamatan : " + kec + "%0A" +
"Kota : " + kota;

let url="https://api.whatsapp.com/send?phone=15558770694&text="+pesan;

window.location.href=url;

}

</script>

</body>
</html>
