<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cek Ongkir COD</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
min-height:100dvh;
margin:0;
padding:20px;
}

.box{
background:white;
padding:30px 24px;
border-radius:16px;
box-shadow:0 12px 35px rgba(0,0,0,0.7);
width:100%;
max-width:480px;
}

.info{
font-size:17px;
color:#444;
margin-bottom:24px;
line-height:1.6;
text-align:center;
}

input{
width:100%;
padding:18px;
margin-top:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:17px;
box-sizing:border-box;
}

button{
margin-top:24px;
width:100%;
padding:18px;
background:#25D366;
border:none;
color:white;
font-weight:bold;
border-radius:10px;
cursor:pointer;
font-size:19px;
}

button:hover{
background:#20b358;
}

</style>

</head>

<body>

<div class="box">

<div class="info">
Silakan masukkan kecamatan dan <br>
kota dengan benar ya kak 😊
</div>

<input type="text" id="kecamatan" placeholder="Kecamatan">

<input type="text" id="kota" placeholder="Kota / Kabupaten">

<button onclick="kirimWA()">Cek Ongkir</button>

</div>

<script>

function kirimWA(){

var kec = document.getElementById("kecamatan").value.trim();
var kota = document.getElementById("kota").value.trim();

if(kec === "" || kota === ""){
alert("Silakan isi kecamatan dan kota dulu ya kak 😊");
return;
}

var pesan =
"📦 CEK ONGKIR TAS TRAVEL%0A%0A"+
"Kecamatan : " + kec + "%0A"+
"Kota/Kabupaten : " + kota;

var url = "https://api.whatsapp.com/send?phone=15558770694&text=" + pesan;

window.location.href = url;

}

</script>

</body>
</html>
